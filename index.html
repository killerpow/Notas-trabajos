```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Trabajos PRO</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .gradient-restore {
            position: relative;
            background: #fff;
            border-radius: 24px;
            border: 2px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name, size]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [tasks, setTasks] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [view, setView] = useState('pending');
            const [showForm, setShowForm] = useState(false);
            const [showExpenseForm, setShowExpenseForm] = useState(false);
            const [editingTaskId, setEditingTaskId] = useState(null);
            const [importText, setImportText] = useState('');
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({
                clientName: '', phone: '', address: '', jobType: '', notes: '', totalAmount: '', paidAmount: ''
            });

            const [expenseData, setExpenseData] = useState({
                concept: '', amount: '', date: new Date().toISOString().split('T')[0]
            });

            // Carga inicial (v11)
            useEffect(() => {
                try {
                    const savedTasks = localStorage.getItem('call_tasks_v11');
                    const savedExpenses = localStorage.getItem('call_expenses_v11');
                    if (savedTasks) setTasks(JSON.parse(savedTasks));
                    if (savedExpenses) setExpenses(JSON.parse(savedExpenses));
                } catch (e) { console.error("Error cargando datos", e); }
            }, []);

            // Guardado automático
            useEffect(() => {
                localStorage.setItem('call_tasks_v11', JSON.stringify(tasks));
                localStorage.setItem('call_expenses_v11', JSON.stringify(expenses));
                if (window.lucide) window.lucide.createIcons();
            }, [tasks, expenses, view]);

            // WhatsApp: Aviso Individual
            const sendClientNotice = (task) => {
                const cleanPhone = task.phone.replace(/\D/g, '');
                const message = "Hola. Vamos a acercarnos en un rato para hacer el trabajo y queríamos saber si estáis en casa y os va bien. Un saludo.";
                window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`, '_blank');
            };

            // WhatsApp: Enviar Listado de Trabajos CON NOTAS
            const sendTaskListWhatsApp = () => {
                if (tasks.length === 0) {
                    alert("No hay trabajos para enviar.");
                    return;
                }
                let message = "*LISTADO DE TRABAJOS DETALLADO*\n\n";
                tasks.forEach((t, i) => {
                    const statusIcon = t.status === 'completed' ? '✅' : (t.status === 'archived' ? '📁' : '⏳');
                    message += `${i + 1}. *${t.clientName}* [${statusIcon}]\n`;
                    message += `   📍 *Dirección:* ${t.address}\n`;
                    message += `   🛠️ *Trabajo:* ${t.jobType}\n`;
                    message += `   📞 *Tel:* ${t.phone}\n`;
                    if (t.notes) {
                        message += `   📝 *Notas:* ${t.notes}\n`;
                    }
                    message += `   💰 *Presupuesto:* ${t.totalAmount}€ | *Pagado:* ${t.paidAmount}€\n`;
                    message += `------------------------\n\n`;
                });
                window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
            };

            // Backups
            const exportToJSON = () => {
                const dataStr = JSON.stringify({ tasks, expenses }, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `backup_completo_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
            };

            const sendBackupWhatsApp = () => {
                const msg = "*BACKUP GESTOR PRO (CÓDIGO)*\n\n" + JSON.stringify({ tasks, expenses });
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const processImportedData = (dataString) => {
                try {
                    let cleanString = dataString.trim();
                    if (cleanString.includes("*BACKUP GESTOR PRO (CÓDIGO)*")) {
                        cleanString = cleanString.split("*BACKUP GESTOR PRO (CÓDIGO)*")[1].trim();
                    }
                    const parsed = JSON.parse(cleanString);
                    if (confirm("¿Restaurar todos los datos? Se borrará lo actual.")) {
                        if (parsed.tasks) setTasks(parsed.tasks);
                        if (parsed.expenses) setExpenses(parsed.expenses);
                        setImportText('');
                        alert("Datos restaurados correctamente.");
                    }
                } catch (err) { alert("Error: Código no válido."); }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => processImportedData(ev.target.result);
                reader.readAsText(file);
            };

            // CRUD
            const handleSubmit = (e) => {
                e.preventDefault();
                const numTotal = parseFloat(formData.totalAmount) || 0;
                const numPaid = parseFloat(formData.paidAmount) || 0;

                if (editingTaskId) {
                    setTasks(tasks.map(t => t.id === editingTaskId ? { ...t, ...formData, totalAmount: numTotal, paidAmount: numPaid } : t));
                } else {
                    const newTask = {
                        ...formData, id: Date.now(), status: 'pending', createdAt: new Date().toLocaleDateString(), totalAmount: numTotal, paidAmount: numPaid
                    };
                    setTasks([newTask, ...tasks]);
                }
                setFormData({ clientName: '', phone: '', address: '', jobType: '', notes: '', totalAmount: '', paidAmount: '' });
                setEditingTaskId(null);
                setShowForm(false);
            };

            const openEditor = (task) => {
                setFormData({
                    clientName: task.clientName, phone: task.phone, address: task.address,
                    jobType: task.jobType, notes: task.notes || '',
                    totalAmount: task.totalAmount, paidAmount: task.paidAmount
                });
                setEditingTaskId(task.id);
                setShowForm(true);
            };

            const handleExpenseSubmit = (e) => {
                e.preventDefault();
                const newExpense = { ...expenseData, id: Date.now(), amount: parseFloat(expenseData.amount) || 0 };
                setExpenses([newExpense, ...expenses]);
                setExpenseData({ concept: '', amount: '', date: new Date().toISOString().split('T')[0] });
                setShowExpenseForm(false);
            };

            const changeStatus = (id, newStatus) => setTasks(tasks.map(t => t.id === id ? {...t, status: newStatus} : t));
            const deleteTask = (id) => { if (confirm('¿Eliminar?')) setTasks(tasks.filter(t => t.id !== id)); };

            const totalIngresos = tasks.reduce((acc, t) => acc + (parseFloat(t.paidAmount) || 0), 0);
            const totalGastos = expenses.reduce((acc, e) => acc + (parseFloat(e.amount) || 0), 0);
            const filtered = tasks.filter(t => ['pending', 'completed', 'archived'].includes(view) ? t.status === view : true);

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col pb-20">
                    <header className="bg-blue-700 text-white p-5 sticky top-0 z-30 shadow-lg">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <h1 className="font-black text-xl flex items-center gap-2 uppercase tracking-tight">
                                <Icon name="hammer" /> GESTOR PRO
                            </h1>
                            <div className="flex gap-2">
                                <button onClick={() => setShowExpenseForm(true)} className="bg-red-500/20 border border-red-400/30 p-3 rounded-2xl active:scale-90 transition-transform">
                                    <Icon name="trending-down" size={18} />
                                </button>
                                <button onClick={() => { setEditingTaskId(null); setFormData({clientName: '', phone: '', address: '', jobType: '', notes: '', totalAmount: '', paidAmount: ''}); setShowForm(true); }} className="bg-green-500 p-3 rounded-2xl shadow-md active:scale-90 transition-transform">
                                    <Icon name="plus" size={24} />
                                </button>
                            </div>
                        </div>
                    </header>

                    <nav className="bg-white border-b sticky top-[72px] z-20 px-2 shadow-sm overflow-x-auto no-scrollbar">
                        <div className="max-w-xl mx-auto flex gap-1 p-1">
                            {[
                                { id: 'pending', label: 'Espera', icon: 'clock' },
                                { id: 'completed', label: 'Hechos', icon: 'check-circle' },
                                { id: 'archived', label: 'Archivo', icon: 'archive' },
                                { id: 'balance', label: 'Balance', icon: 'pie-chart' },
                                { id: 'backups', label: 'Copias', icon: 'save' }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setView(tab.id)} 
                                    className={`flex-1 min-w-[65px] py-3 rounded-2xl flex flex-col items-center gap-1 transition-all ${view === tab.id ? 'bg-blue-50 text-blue-700 font-black' : 'text-slate-400'}`}>
                                    <Icon name={tab.icon} size={18} />
                                    <span className="text-[9px] uppercase font-bold">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="flex-1 p-4 max-w-xl mx-auto w-full space-y-4">
                        {view === 'balance' && (
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-6 rounded-[32px] border text-center">
                                        <p className="text-[10px] font-bold uppercase text-slate-400 mb-1">Ingresos</p>
                                        <h2 className="text-2xl font-black text-green-600">{totalIngresos.toFixed(2)}€</h2>
                                    </div>
                                    <div className="bg-white p-6 rounded-[32px] border text-center">
                                        <p className="text-[10px] font-bold uppercase text-slate-400 mb-1">Gastos</p>
                                        <h2 className="text-2xl font-black text-red-500">{totalGastos.toFixed(2)}€</h2>
                                    </div>
                                </div>
                                <div className="bg-slate-900 p-8 rounded-[40px] text-white shadow-xl">
                                    <p className="text-[10px] font-bold uppercase opacity-60 mb-1 tracking-widest">Beneficio Neto</p>
                                    <h2 className="text-5xl font-black">{(totalIngresos - totalGastos).toFixed(2)}€</h2>
                                </div>
                            </div>
                        )}

                        {view === 'backups' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-white p-6 rounded-[32px] border shadow-sm space-y-4">
                                    <h3 className="font-black text-lg px-2 uppercase">Compartir Listado</h3>
                                    <button onClick={sendTaskListWhatsApp} className="w-full bg-green-600 text-white p-5 rounded-3xl flex items-center justify-center gap-3 font-black text-xs shadow-lg active:scale-95">
                                        <Icon name="message-square" /> ENVIAR LISTADO + NOTAS (WhatsApp)
                                    </button>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={exportToJSON} className="bg-blue-600 text-white p-5 rounded-3xl flex flex-col items-center gap-2 font-black text-[10px] active:scale-95">
                                            <Icon name="download" /> DESCARGAR JSON
                                        </button>
                                        <button onClick={sendBackupWhatsApp} className="bg-slate-800 text-white p-5 rounded-3xl flex flex-col items-center gap-2 font-black text-[10px] active:scale-95">
                                            <Icon name="shield-check" /> BACKUP CÓDIGO
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-[32px] border shadow-sm space-y-5">
                                    <h3 className="font-black text-lg px-2 uppercase">Restaurar</h3>
                                    <div onClick={() => fileInputRef.current.click()} className="bg-slate-50 border-2 border-dashed border-slate-200 rounded-[24px] p-6 flex flex-col items-center gap-2 cursor-pointer active:bg-blue-50">
                                        <Icon name="file-up" size={24} className="text-blue-500" />
                                        <p className="font-bold text-slate-700 text-xs uppercase">Elegir Archivo</p>
                                        <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept=".json,.txt" />
                                    </div>
                                    <div className="gradient-restore p-5 space-y-3">
                                        <textarea 
                                            placeholder="Pegar código de WhatsApp aquí..." 
                                            className="w-full bg-slate-50 rounded-xl p-4 text-xs h-24 outline-none border border-slate-100"
                                            value={importText}
                                            onChange={(e) => setImportText(e.target.value)}
                                        />
                                        <button onClick={() => processImportedData(importText)} className="w-full py-4 bg-blue-700 text-white rounded-2xl font-black text-xs">RESTAURAR AHORA</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {(view === 'pending' || view === 'completed' || view === 'archived') && (
                            filtered.map(task => (
                                <div key={task.id} className="bg-white p-6 rounded-[32px] border card-shadow space-y-4 relative">
                                    <div className="absolute top-6 right-6 flex gap-2">
                                        <button onClick={() => sendClientNotice(task)} className="bg-green-100 p-2 rounded-xl text-green-600 active:bg-green-600 active:text-white">
                                            <Icon name="message-circle" size={18} />
                                        </button>
                                        <button onClick={() => openEditor(task)} className="bg-slate-50 p-2 rounded-xl text-slate-400 active:text-blue-600">
                                            <Icon name="edit-3" size={18} />
                                        </button>
                                    </div>

                                    <div className="flex items-center gap-3 pr-24">
                                        <div className="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600 font-black uppercase">{task.clientName.charAt(0)}</div>
                                        <div>
                                            <h4 className="font-black text-lg leading-tight">{task.clientName}</h4>
                                            <p className="text-blue-600 font-bold text-xs">{task.phone}</p>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-4 rounded-2xl space-y-2 text-xs">
                                        <p className="font-bold flex items-center gap-2 text-slate-700"><Icon name="hammer" size={14} className="text-slate-400"/> {task.jobType}</p>
                                        <p className="text-slate-500 flex items-center gap-2"><Icon name="map-pin" size={14} className="text-slate-400"/> {task.address}</p>
                                        {task.notes && <p className="text-slate-600 pt-2 mt-2 border-t border-slate-200 italic">{task.notes}</p>}
                                        
                                        <div className="pt-2 mt-2 border-t flex justify-between items-end">
                                            <div>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Total</p>
                                                <p className="font-black text-slate-700">{task.totalAmount.toFixed(2)}€</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Pagado</p>
                                                <p className="font-black text-green-600">{task.paidAmount.toFixed(2)}€</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex gap-2">
                                        {view === 'pending' && <button onClick={() => changeStatus(task.id, 'completed')} className="flex-1 bg-green-600 p-4 rounded-2xl text-[10px] font-black text-white shadow-md active:scale-95 uppercase">Finalizar</button>}
                                        {view === 'completed' && <button onClick={() => changeStatus(task.id, 'archived')} className="flex-1 bg-slate-700 p-4 rounded-2xl text-[10px] font-black text-white uppercase">Archivar</button>}
                                        {view === 'archived' && <button onClick={() => changeStatus(task.id, 'pending')} className="flex-1 bg-blue-100 text-blue-700 p-4 rounded-2xl text-[10px] font-black uppercase">Reabrir</button>}
                                        <button onClick={() => deleteTask(task.id)} className="bg-red-50 text-red-500 p-4 rounded-2xl active:bg-red-500 active:text-white transition-colors">
                                            <Icon name="trash-2" size={18} />
                                        </button>
                                    </div>
                                </div>
                            ))
                        )}
                    </main>

                    {/* MODAL TRABAJO */}
                    {showForm && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-end justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-t-[40px] p-8 modal-animate max-h-[95vh] overflow-y-auto no-scrollbar shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black uppercase tracking-tight">{editingTaskId ? 'Editar Datos' : 'Nuevo Trabajo'}</h2>
                                    <button onClick={() => setShowForm(false)} className="bg-slate-100 p-2 rounded-full"><Icon name="x" /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <input required placeholder="Cliente" className="w-full bg-slate-50 p-4 rounded-2xl outline-none" value={formData.clientName} onChange={e => setFormData({...formData, clientName: e.target.value})} />
                                    <input required placeholder="Teléfono" className="w-full bg-slate-50 p-4 rounded-2xl outline-none" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                    <input required placeholder="Dirección" className="w-full bg-slate-50 p-4 rounded-2xl outline-none" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} />
                                    <input required placeholder="¿Qué trabajo es?" className="w-full bg-slate-50 p-4 rounded-2xl font-bold" value={formData.jobType} onChange={e => setFormData({...formData, jobType: e.target.value})} />
                                    <textarea placeholder="Notas adicionales o materiales..." className="w-full bg-slate-50 p-4 rounded-2xl outline-none h-24 resize-none text-sm" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} />
                                    
                                    <div className="grid grid-cols-2 gap-3 bg-blue-50 p-3 rounded-[24px]">
                                        <div>
                                            <label className="text-[9px] font-black text-blue-400 ml-2 uppercase">Presupuesto €</label>
                                            <input type="number" step="any" className="w-full bg-white p-4 rounded-xl font-black" value={formData.totalAmount} onChange={e => setFormData({...formData, totalAmount: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-green-400 ml-2 uppercase">Pagado €</label>
                                            <input type="number" step="any" className="w-full bg-white p-4 rounded-xl font-black text-green-600" value={formData.paidAmount} onChange={e => setFormData({...formData, paidAmount: e.target.value})} />
                                        </div>
                                    </div>
                                    
                                    <button type="submit" className="w-full bg-blue-700 text-white p-5 rounded-[24px] font-black text-lg mt-4 shadow-xl active:scale-95 uppercase tracking-tighter">
                                        {editingTaskId ? 'Actualizar' : 'Guardar'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL GASTO */}
                    {showExpenseForm && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl modal-animate text-center">
                                <h2 className="text-xl font-black text-red-600 mb-6 uppercase">Anotar Gasto</h2>
                                <form onSubmit={handleExpenseSubmit} className="space-y-4 text-left">
                                    <input required placeholder="Gasolina, Material, etc..." className="w-full bg-slate-50 p-4 rounded-2xl outline-none" value={expenseData.concept} onChange={e => setExpenseData({...expenseData, concept: e.target.value})} />
                                    <input required type="number" step="any" placeholder="Importe €" className="w-full bg-slate-50 p-4 rounded-2xl font-black text-red-500" value={expenseData.amount} onChange={e => setExpenseData({...expenseData, amount: e.target.value})} />
                                    <input required type="date" className="w-full bg-slate-50 p-4 rounded-2xl font-bold" value={expenseData.date} onChange={e => setExpenseData({...expenseData, date: e.target.value})} />
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setShowExpenseForm(false)} className="flex-1 p-4 font-bold text-slate-400">CERRAR</button>
                                        <button type="submit" className="flex-[2] bg-red-600 text-white p-5 rounded-[24px] font-black shadow-lg uppercase">Guardar Gasto</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
