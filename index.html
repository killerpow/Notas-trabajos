```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Trabajos</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Iconos simplificados usando clases CSS de Lucide
        const Icon = ({ name, size = 20, className = "" }) => (
            <i className={`lucide-${name} ${className}`} style={{ fontSize: size, width: size, height: size }}></i>
        );

        const App = () => {
            const [tasks, setTasks] = useState([]);
            const [showForm, setShowForm] = useState(false);
            const [editingFinance, setEditingFinance] = useState(null);
            const [view, setView] = useState('pending');
            
            const [formData, setFormData] = useState({
                clientName: '', phone: '', address: '', jobType: '', notes: '', totalAmount: '', paidAmount: ''
            });

            const [financeEditData, setFinanceEditData] = useState({ totalAmount: '', paidAmount: '' });

            useEffect(() => {
                const saved = localStorage.getItem('call_tasks_v2');
                if (saved) setTasks(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('call_tasks_v2', JSON.stringify(tasks));
            }, [tasks]);

            const handleSubmit = (e) => {
                e.preventDefault();
                const newTask = {
                    ...formData,
                    id: Date.now(),
                    status: 'pending',
                    createdAt: new Date().toLocaleDateString(),
                    totalAmount: formData.totalAmount !== '' ? parseFloat(formData.totalAmount) : null,
                    paidAmount: formData.paidAmount !== '' ? parseFloat(formData.paidAmount) : 0
                };
                setTasks([newTask, ...tasks]);
                setFormData({ clientName: '', phone: '', address: '', jobType: '', notes: '', totalAmount: '', paidAmount: '' });
                setShowForm(false);
            };

            const shareByWhatsApp = () => {
                const pendingTasks = tasks.filter(t => t.status === 'pending');
                if (pendingTasks.length === 0) { alert("No hay trabajos pendientes."); return; }
                let msg = "*RELACIÓN DE TRABAJOS PENDIENTES*\n\n";
                pendingTasks.forEach((t, i) => {
                    msg += `${i + 1}. *${t.clientName}*\n📞 ${t.phone}\n📍 ${t.address}\n🛠️ ${t.jobType}\n${t.notes ? '📝 ' + t.notes + '\n' : ''}--------------------------\n`;
                });
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const filteredTasks = tasks.filter(t => view === 'finance' ? true : t.status === view);
            const today = new Date().toLocaleDateString();
            const todayTasks = tasks.filter(t => t.createdAt === today);
            const totalDaily = todayTasks.reduce((acc, curr) => acc + (curr.paidAmount || 0), 0);

            return (
                <div className="min-h-screen bg-slate-50 pb-10 font-sans">
                    <header className="bg-blue-700 text-white p-6 shadow-lg sticky top-0 z-10 flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-bold">Mi Trabajo Diario</h1>
                            <p className="text-blue-100 text-xs">Gestión de Cobros y Tareas</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={shareByWhatsApp} className="bg-green-600 p-3 rounded-full shadow-md"><ShareIcon /></button>
                            <button onClick={() => setShowForm(true)} className="bg-green-500 p-3 rounded-full shadow-md"><PlusIcon /></button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4">
                        <div className="flex bg-white rounded-xl shadow-sm mb-6 p-1 border overflow-x-auto no-scrollbar">
                            {['pending', 'completed', 'archived', 'finance'].map(id => (
                                <button key={id} onClick={() => setView(id)} className={`flex-1 py-2 px-3 rounded-lg text-xs font-bold capitalize ${view === id ? 'bg-blue-100 text-blue-700' : 'text-slate-500'}`}>
                                    {id === 'pending' ? 'Pendientes' : id === 'completed' ? 'Realizados' : id === 'archived' ? 'Historial' : 'Caja Hoy'}
                                </button>
                            ))}
                        </div>

                        {view === 'finance' && (
                            <div className="bg-green-600 rounded-2xl p-6 text-white shadow-md mb-6">
                                <p className="text-sm opacity-80">Total Cobrado Hoy ({today})</p>
                                <h2 className="text-4xl font-black">{totalDaily.toLocaleString()}€</h2>
                            </div>
                        )}

                        <div className="space-y-4">
                            {filteredTasks.map(task => (
                                <div key={task.id} className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                                    <div className="flex justify-between mb-4">
                                        <div>
                                            <h3 className="font-bold text-lg">{task.clientName}</h3>
                                            <p className="text-blue-600 font-bold text-sm"> {task.phone}</p>
                                        </div>
                                        <span className="text-[10px] bg-slate-100 px-2 py-1 rounded-full font-bold">{task.createdAt}</span>
                                    </div>
                                    <div className="bg-slate-50 p-3 rounded-xl text-sm mb-4">
                                        <p><strong>🛠️ Trabajo:</strong> {task.jobType}</p>
                                        <p><strong>📍 Dir:</strong> {task.address}</p>
                                        <div className="mt-2 pt-2 border-t flex justify-between font-bold">
                                            <span>Cobrado:</span>
                                            <span className="text-green-600">{task.paidAmount}€ / {task.totalAmount ? task.totalAmount + '€' : '---'}</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        {task.status === 'pending' ? (
                                            <button onClick={() => {
                                                const amount = prompt("¿Cuánto has cobrado al final?");
                                                if(amount !== null) {
                                                    setTasks(tasks.map(t => t.id === task.id ? {...t, status:'completed', paidAmount: parseFloat(amount), totalAmount: parseFloat(amount)} : t));
                                                }
                                            }} className="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold flex-1">Finalizar</button>
                                        ) : (
                                            <button onClick={() => setTasks(tasks.map(t => t.id === task.id ? {...t, status:'pending'} : t))} className="bg-orange-500 text-white px-4 py-2 rounded-lg text-xs font-bold">Deshacer</button>
                                        )}
                                        <button onClick={() => setTasks(tasks.filter(t => t.id !== task.id))} className="text-red-500 px-2">Borrar</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {showForm && (
                        <div className="fixed inset-0 bg-black/60 p-4 z-50 flex items-center justify-center">
                            <div className="bg-white rounded-2xl w-full max-w-md p-6">
                                <h2 className="font-bold mb-4">Nueva Llamada</h2>
                                <input className="w-full border p-3 rounded-xl mb-2" placeholder="Nombre" onChange={e => setFormData({...formData, clientName: e.target.value})} />
                                <input className="w-full border p-3 rounded-xl mb-2" placeholder="Teléfono" onChange={e => setFormData({...formData, phone: e.target.value})} />
                                <input className="w-full border p-3 rounded-xl mb-2" placeholder="Dirección" onChange={e => setFormData({...formData, address: e.target.value})} />
                                <input className="w-full border p-3 rounded-xl mb-4" placeholder="¿Qué necesita?" onChange={e => setFormData({...formData, jobType: e.target.value})} />
                                <div className="flex gap-2">
                                    <button onClick={() => setShowForm(false)} className="flex-1 p-3 border rounded-xl">Cerrar</button>
                                    <button onClick={handleSubmit} className="flex-1 p-3 bg-blue-600 text-white rounded-xl font-bold">Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Iconos auxiliares
        const PlusIcon = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const ShareIcon = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
